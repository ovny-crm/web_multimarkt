@if (isVisible) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" (click)="closeModal()"></div>

    <!-- Modal -->
    <div
        class="relative bg-white rounded-2xl shadow-2xl shadow-blue-500/10 max-w-md w-full p-8 border-t-4 border-blue-500">
        <button (click)="closeModal()"
            class="absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <div class="text-center mb-6">
            <div
                class="inline-flex items-center justify-center w-12 h-12 bg-gradient-to-br from-blue-600 to-cyan-500 rounded-xl text-white text-xl mb-4 shadow-lg shadow-blue-500/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-slate-700 uppercase tracking-wide">Compara y Ahorra</h3>
            <p class="text-slate-500 text-sm mt-1">Te decimos cuánto puedes ahorrar</p>
        </div>

        <app-lead-form [showServiceSelector]="true" [preselectedService]="selectedService" buttonText="Ver mi ahorro →"
            (formSubmitted)="onLeadSubmitted($event)" />
    </div>
</div>
}
